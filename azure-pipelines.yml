trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  imageName: 'althira-products-backend'

stages:
- stage: Build
  displayName: 'Build and Push Docker Image'
  jobs:
  - job: Build
    steps:
    # 1. Login a un registro (Docker Hub o Azure Container Registry)
    
    - task: Docker@2
      displayName: 'Build Docker Image'
      inputs:
        command: 'build'
        Dockerfile: '**/Dockerfile'
        tags: |
          $(Build.BuildId)
          latest