trigger:
- main

pool:
  name: 'Default'

variables:
  imageName: 'althira-products'

stages:
- stage: Build
  displayName: 'Build and Push Docker Image'
  jobs:
  - job: Build
    steps:
    - task: Docker@2
      displayName: 'Build and Push to Docker Hub'
      inputs:
        containerRegistry: 'dockerhub-althira'
        repository: 'yangolas/$(imageName)'
        command: 'buildAndPush'
        Dockerfile: '**/Dockerfile'
        buildContext: '.'
        tags: |
          $(Build.BuildId)
          latest