trigger:
- main

pool:
  name: 'Default'

variables:
  imageName: 'althira-products'
  # Es mejor definir el repo aquí para no repetirlo
  dockerRepo: 'yangolas/$(imageName)'

stages:
- stage: Build
  displayName: 'Build and Push Docker Image'
  jobs:
  - job: Build
    steps:
    # 1. Construir y subir la imagen (Perfecto como lo tenías)
    - task: Docker@2
      displayName: 'Build and Push to Docker Hub'
      inputs:
        containerRegistry: 'dockerhub-althira'
        repository: '$(dockerRepo)'
        command: 'buildAndPush'
        Dockerfile: '**/Dockerfile'
        buildContext: '.'
        tags: |
          $(Build.BuildId)
          latest

    - powershell: |
        # Helm upgrade directo usando tu configuración local
        helm upgrade --install althira-products k8s/Charts `
          --values k8s/Charts/values-dev.yaml `
          --set image.tag=$(Build.BuildId) `
          --namespace althira-products
      displayName: 'Deploy con Helm Local'