apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-srv"
  namespace: "{{ .Values.namespace }}"
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  selector:
    app: {{ .Values.appName | default "althira-products" }}
    component: api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80