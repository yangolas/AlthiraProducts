apiVersion: v1
kind: Service
metadata:
  # El nombre será althira-products-srv
  name: "{{ .Release.Name }}-srv"
  namespace: "{{ .Values.namespace }}"
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  selector:
    # IMPORTANTE: Estos labels deben coincidir con los de tu Deployment Maestro
    app: {{ .Values.appName | default "althira-products" }}
    component: api # <-- Aquí está la magia: solo apunta a la Web API
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80